# ── Cloudflare Workers configuration ──────────────────────────
# Docs: https://developers.cloudflare.com/workers/configuration/
# wrangler.toml
name            = 'wheredidigo'
main            = "worker.js"
compatibility_date = "2024-09-23"

# Workers Assets — serve the entire project directory as static files.
# visited.json and vendor/* are included automatically.
[assets]
directory          = "./"
# Serve index.html for any path that has no matching file (SPA-style).
not_found_handling = "single-page-application"
